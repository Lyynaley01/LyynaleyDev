<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topup Saldo - LyynaleyXiters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>

        #btn-pay {
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 0 rgba(255, 165, 0, 0); /* Bayangan kosong saat mati */
}

/* Class ini akan ditambahkan via JavaScript saat nominal dipilih */
.btn-glow {
    box-shadow: 0 4px 20px rgba(255, 140, 0, 0.4), 0 0 40px rgba(255, 165, 0, 0.2) !important;
}

        /* Efek Halus untuk Detail Pembayaran */
#payment-detail {
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0;
    transform: translateY(-10px);
    max-height: 0;
    overflow: hidden;
    display: block !important; /* Kita gunakan opacity & max-height untuk animasi */
}

#payment-detail.show {
    opacity: 1;
    transform: translateY(0);
    max-height: 500px; /* Nilai cukup besar untuk menampung isi */
    margin-top: 1.5rem;
    padding: 1.5rem;
}

/* Menghilangkan tombol naik-turun di Chrome, Safari, Edge, dan Opera */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

/* Menghilangkan tombol naik-turun di Firefox */
input[type=number] {
    -moz-appearance: textfield;
}

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #221a0f, #0a0a0a);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 165, 0, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
        }

        .orange-gradient-card {
            background: linear-gradient(135deg, #1a140a 0%, #3d2b08 100%);
            border: 1px solid rgba(255, 165, 0, 0.2);
        }

        .btn-nominal {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .btn-nominal:hover, .btn-nominal.active {
            border-color: #ffa500;
            background: rgba(255, 165, 0, 0.1);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(90deg, #ffa500, #ff8c00);
            color: #000;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.4);
            transform: scale(1.02);
        }

        .badge-populer {
            background: #ffa600de;
            color: #000;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            position: absolute;
            top: -10px;
            right: 10px;
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- Navbar Minimalis -->
    <nav class="flex justify-between items-center px-6 py-5 max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold text-white">Lyynaley<span class="text-orange-500">Xiters</span></h1>
        <div class="flex gap-6 items-center text-sm font-medium">
            <a href="index.html" class="hover:text-orange-500 transition">HOME</a>
            <a href="shop.html" class="hover:text-orange-500 transition">SHOP</a>
            <div class="bg-black/40 border border-white/10 px-4 py-2 rounded-full flex items-center gap-2">
                <span class="text-orange-500">💰</span>
                <span id="nav-saldo">Rp 0</span>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 mt-8">
        
        <!-- Info Saldo User -->
        <div class="orange-gradient-card p-8 rounded-[32px] relative overflow-hidden mb-8">
            <div class="relative z-10">
                <p class="text-sm opacity-70 mb-1">
    👋 Halo, <span id="user-name" class="font-bold text-orange-500">Loading...</span>
                </span>
                <h2 class="text-xs tracking-widest opacity-50 font-bold mb-4">SALDO KAMU</h2>
                
                <div class="flex items-end gap-2 mb-6">
                    <span class="text-2xl font-bold text-orange-500 mb-1">Rp</span>
                    <span class="text-6xl font-black tracking-tighter" id="display-saldo">0</span>
                </div>

                <div class="flex gap-3">
                    <div class="bg-green-500/10 border border-green-500/20 px-3 py-1.5 rounded-full flex items-center gap-2 text-[11px] text-green-400">
                        <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                        Akun Aktif
                    </div>
                    <div class="bg-orange-500/10 border border-orange-500/20 px-3 py-1.5 rounded-full flex items-center gap-2 text-[11px] text-orange-400">
                        ⚡ Instant Topup
                    </div>
                </div>
            </div>
            <!-- Dekorasi Lingkaran -->
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-orange-500/10 rounded-full blur-3xl"></div>
        </div>

        <!-- Form Topup -->
<div class="glass-card p-8">
    <div class="flex items-center gap-3 mb-2">
        <span class="text-xl">💳</span>
        <h3 class="text-xl font-bold">Topup Saldo</h3>
    </div>
    <p class="text-sm opacity-50 mb-8">Pilih nominal atau masukkan jumlah custom.</p>

    <label class="text-xs font-bold opacity-40 tracking-widest block mb-4">PILIH NOMINAL</label>
    
    <!-- Tombol Nominal -->
    <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
        <button type="button" class="btn-nominal p-5 rounded-2xl text-center font-bold border border-white/10 bg-white/5">Rp10.000</button>
        <button type="button" class="btn-nominal p-5 rounded-2xl text-center font-bold border border-white/10 bg-white/5">Rp20.000</button>
        <button type="button" class="btn-nominal p-5 rounded-2xl text-center font-bold border border-white/10 bg-white/5 relative">
            <span class="badge-populer">POPULER</span>
            Rp50.000
        </button>
        <button type="button" class="btn-nominal p-5 rounded-2xl text-center font-bold border border-white/10 bg-white/5">Rp100.000</button>
        <button type="button" class="btn-nominal p-5 rounded-2xl text-center font-bold border border-white/10 bg-white/5">Rp200.000</button>
        <button type="button" class="btn-nominal p-5 rounded-2xl text-center font-bold border border-white/10 bg-white/5">Rp500.000</button>
    </div>

    <!-- Input Custom -->
    <div class="relative mb-8">
        <span class="absolute left-5 top-1/2 -translate-y-1/2 font-bold text-white/30">Rp</span>
        <input type="number" id="custom-nominal" placeholder="Nominal lain (min. 5.000)" 
            class="w-full bg-white/5 border border-white/10 p-5 pl-12 rounded-2xl focus:outline-none focus:border-orange-500 transition appearance-none">
    </div>

    <!-- Kotak Detail Pembayaran (Hidden secara default) -->
    <div id="payment-detail" class="mt-6 p-6 border-t border-white/10 space-y-4 bg-white/5 rounded-2xl mb-4">
        <div class="flex justify-between text-sm">
            <span class="opacity-50">Topup Saldo</span>
            <span id="detail-topup" class="font-bold">Rp0</span>
        </div>
        <div class="flex justify-between text-sm">
            <span class="opacity-50">Metode</span>
            <span class="font-bold text-orange-500">QRIS</span>
        </div>
        <div class="pt-4 border-t border-white/10 flex justify-between items-center">
            <span class="text-sm opacity-50">Total Bayar</span>
            <span id="total-bayar" class="text-2xl font-black text-white">Rp0</span>
        </div>
    </div>

    <!-- Tombol Bayar -->
    <button id="btn-pay" class="btn-primary w-full py-5 rounded-2xl text-lg shadow-lg opacity-50 cursor-not-allowed" disabled>
        Pilih nominal dulu
    </button>
</div>

            <!-- Keamanan -->
            <div class="flex flex-wrap justify-center gap-6 mt-10 opacity-40 text-[11px]">
                <div class="flex items-center gap-2"><i class="fas fa-lock text-orange-500"></i> Aman & Terenkripsi</div>
                <div class="flex items-center gap-2"><i class="fas fa-bolt text-orange-500"></i> Instant via QRIS</div>
                <div class="flex items-center gap-2"><i class="fas fa-university text-orange-500"></i> Semua Bank & E-wallet</div>
            </div>
        </div>

    </main>

    <!-- Script Koneksi Firebase Saldo (Sama seperti halaman utama) -->
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Masukkan Config Firebase Anda di sini
    const firebaseConfig = {
        apiKey: "AIzaSyATMm7NhnDgOI3klh2EiV7xkb9GMIoUWHg",
            authDomain: "lyynaleyxiters.firebaseapp.com",
            projectId: "lyynaleyxiters",
            storageBucket: "lyynaleyxiters.firebasestorage.app",
            messagingSenderId: "85048055336",
            appId: "1:85048055336:web:4a8b07e8ef32690e36871d",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            console.log("User Login detect:", user.uid); // Cek di F12 Console
            
            // Referensi ke koleksi "users"
            const userDocRef = doc(db, "users", user.uid);

            onSnapshot(userDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Ambil Username dari Firebase
                    const namaElement = document.getElementById('user-name');
                    if (namaElement) {
                        // Jika field 'username' kosong, tampilkan nama email sebagai cadangan
                        namaElement.innerText = data.username || user.displayName || "Lyynaley User";
                    }

                    // Ambil Saldo dari Firebase
                    const saldoVal = data.saldo || 0;
                    const formatted = new Intl.NumberFormat('id-ID').format(saldoVal);
                    
                    if (document.getElementById('display-saldo')) {
                        document.getElementById('display-saldo').innerText = formatted;
                    }
                    if (document.getElementById('nav-saldo')) {
                        document.getElementById('nav-saldo').innerText = "Rp " + formatted;
                    }
                }
            });
        } else {
            console.log("Tidak ada user yang login!");
            window.location.href = "login.html"; // Opsional: paksa login jika tidak ada user
        }
    });
</script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const nominalButtons = document.querySelectorAll('.btn-nominal');
        const customInput = document.getElementById('custom-nominal');
        const paymentDetail = document.getElementById('payment-detail');
        const detailTopup = document.getElementById('detail-topup');
        const totalBayar = document.getElementById('total-bayar');
        const btnPay = document.getElementById('btn-pay');

        function formatRupiah(angka) {
            return "Rp" + new Intl.NumberFormat('id-ID').format(angka);
        }

        function updatePayment(amount) {
    if (amount && amount >= 5000) {
        paymentDetail.classList.add('show');
        
        const formatted = formatRupiah(amount);
        detailTopup.innerText = formatted;
        totalBayar.innerText = formatted;
        
        // Update Tombol & Tambahkan Shadow
        btnPay.innerText = `💳 Topup ${formatted} via QRIS`;
        btnPay.classList.remove('opacity-50', 'cursor-not-allowed');
        btnPay.classList.add('btn-glow'); // Menyalakan shadow
        btnPay.style.background = "linear-gradient(90deg, #ffa500, #ff8c00)";
        btnPay.disabled = false;
    } else {
        paymentDetail.classList.remove('show');
        
        // Matikan Tombol & Shadow
        btnPay.innerText = "Pilih nominal dulu";
        btnPay.classList.add('opacity-50', 'cursor-not-allowed');
        btnPay.classList.remove('btn-glow'); // Mematikan shadow
        btnPay.style.background = "rgba(255, 255, 255, 0.05)";
        btnPay.disabled = true;
    }
}

        // Event Klik Tombol
        nominalButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Hapus style aktif dari semua tombol
                nominalButtons.forEach(b => {
                    b.style.borderColor = "rgba(255, 255, 255, 0.1)";
                    b.style.backgroundColor = "rgba(255, 255, 255, 0.05)";
                });

                // Set style aktif ke tombol yang diklik
                this.style.borderColor = "#ffa500";
                this.style.backgroundColor = "rgba(255, 165, 0, 0.1)";

                // Ambil angka
                const val = this.innerText.replace(/[^0-9]/g, '');
                customInput.value = ""; 
                updatePayment(parseInt(val));
            });
        });

        // Event Input Manual
        customInput.addEventListener('input', function() {
            nominalButtons.forEach(b => {
                b.style.borderColor = "rgba(255, 255, 255, 0.1)";
                b.style.backgroundColor = "rgba(255, 255, 255, 0.05)";
            });
            updatePayment(parseInt(this.value));
        });
    });
</script>

</body>
</html>
