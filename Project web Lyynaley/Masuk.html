<html>

<head>
  <title>Masuk ke akun</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&display=swap" rel="stylesheet">

  <style>
    .home-icon {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 10px;
      height: 10px;
      filter: drop-shadow(0 0 5px orange);
      transition: 0.3s;
    }

    .home-btn:hover .home-icon {
      position: absolute;
      top: 20px;
      left: 20px;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: #140800;
      background-image: radial-gradient(circle at top, rgba(255, 140, 0, 0.2), transparent 40%), linear-gradient(rgba(255, 140, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 140, 0, 0.05) 1px, transparent 1px);
      background-size: cover, 50px 50px, 50px 50px;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      width: 350px;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 30px rgba(255, 140, 0, 0.08);
    }

    .login-title {
      color: white;
      text-align: center;
      font-size: 35px;
      margin-bottom: 30px;
    }

    .login-title span {
      color: orange;
    }

    .input-box {
      width: 100%;
      padding: 14px;
      margin-bottom: 20px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 15px;
    }

    .input-box::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .login-button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: orange;
      color: black;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
    }
  </style>

</head>

<body>

  <a href="index.html" class="home-btn">🏠</a>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {

      apiKey: "AIzaSyATMm7NhnDgOI3klh2EiV7xkb9GMIoUWHg",
      authDomain: "lyynaleyxiters.firebaseapp.com",
      projectId: "lyynaleyxiters",
      storageBucket: "lyynaleyxiters.firebasestorage.app",
      messagingSenderId: "85048055336",
      appId: "1:85048055336:web:4a8b07e8ef32690e36871d",
      measurementId: "G-K3XZQ6YF10"

    };

    document.getElementById("loginBtn")
      .addEventListener("click", () => {

        const email =
          document.getElementById("email").value;

        const password =
          document.getElementById("password").value;

        signInWithEmailAndPassword(auth, email, password)

          .then((userCredential) => {

            alert("Login berhasil 🔥");

            window.location.href = "index.html";

          })

          .catch((error) => {

            alert(error.message);

          });

      });

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

  </script>

  <div class="login-box">

    <h1 class="login-title">
      Masuk <span>Akun</span>
    </h1>

    <input type="email" placeholder="Email" class="input-box" id="email">

    <input type="password" placeholder="Password" class="input-box" id="password">

    <button class="login-button" id="loginBtn">
      MASUK
    </button>

  </div>

</body>

</html>
